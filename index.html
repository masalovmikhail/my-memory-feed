<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя лента</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}
button {
  padding: 10px 15px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}
.primary {
  background: black;
  color: white;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
}
img {
  width: 100%;
  border-radius: 12px;
  margin-top: 5px;
}
.login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
</style>
</head>
<body>

<div id="loginScreen" class="login">
  <div class="card">
    <h2>🔐 Вход</h2>
    <input id="login" placeholder="Логин">
    <input id="password" type="password" placeholder="Пароль">
    <button class="primary" onclick="login()">Войти</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <h1>Моя лента воспоминаний ✨</h1>
    <button class="primary" onclick="showForm()">+ Новый пост</button>
    <div id="form" style="display:none;">
      <input id="title" placeholder="Заголовок">
      <textarea id="text" placeholder="Описание"></textarea>
      <input type="file" id="images" multiple accept="image/*">
      <button class="primary" onclick="addPost()">Опубликовать</button>
    </div>
    <div id="posts"></div>
  </div>
</div>

<script>
const correctLogin = "L1";
const correctPassword = "qwaszx12345";

function login() {
  const l = document.getElementById("login").value;
  const p = document.getElementById("password").value;
  if (l === correctLogin && p === correctPassword) {
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Неверный логин или пароль");
  }
}

function showForm() {
  document.getElementById("form").style.display="block";
}

function addPost() {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;
  const files = document.getElementById("images").files;
  const readerPromises = [];

  for (let file of files) {
    readerPromises.push(new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    }));
  }

  Promise.all(readerPromises).then(images => {
    const post = {
      title,
      text,
      images,
      date: new Date().toLocaleDateString()
    };

    const posts = JSON.parse(localStorage.getItem("posts") || "[]");
    posts.unshift(post);
    localStorage.setItem("posts", JSON.stringify(posts));
    renderPosts();
  });
}

function renderPosts() {
  const posts = JSON.parse(localStorage.getItem("posts") || "[]");
  const container = document.getElementById("posts");
  container.innerHTML = "";
  posts.forEach(post => {
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <h3>${post.title}</h3>
      <small>${post.date}</small>
      <p>${post.text}</p>
      ${post.images.map(img => `<img src="${img}">`).join("")}
    `;
    container.appendChild(div);
  });
}

renderPosts();
</script>

</body>
</html>
