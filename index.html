<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя лента</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f2f7;
}
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}
textarea {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
  cursor: pointer;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
}
</style>
</head>
<body>

<div class="container">
  <h2>Моя лента</h2>
  <textarea id="postInput" placeholder="Напиши что-нибудь..."></textarea>
  <button onclick="addPost()">Опубликовать</button>

  <div id="feed"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ivoxwblvtensfockqhty.supabase.co",
  "sb_publishable_tow2A6kwro01XXzu4Kp9bw_M8pfrPSW"
);

async function loadPosts() {
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = post.content;
    feed.appendChild(div);
  });
}

async function addPost() {
  const input = document.getElementById("postInput");
  const text = input.value;

  if (!text) return;

  await supabase.from("posts").insert([
    { content: text }
  ]);

  input.value = "";
  loadPosts();
}

loadPosts();
</script>

</body>
</html>
