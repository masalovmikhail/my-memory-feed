<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Моя лента</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
}
.container {
    max-width:600px;
    margin:auto;
    padding:20px;
}
.card {
    background:white;
    padding:15px;
    border-radius:20px;
    margin-bottom:20px;
}
textarea {
    width:100%;
    padding:12px;
    border-radius:15px;
    border:1px solid #ddd;
    font-size:16px;
    margin-bottom:10px;
}
button {
    background:black;
    color:white;
    padding:10px 15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
}
.grid img {
    width:100%;
    border-radius:12px;
}
.message {
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>
<div class="container">

<h2>Моя лента</h2>

<div class="card">
<textarea id="content" placeholder="Напиши воспоминание... 😊"></textarea>
<input type="file" id="images" multiple accept="image/*" />
<button id="publishBtn">Опубликовать</button>
    <div id="feed"></div>
<div class="message" id="message"></div>
</div>

<div id="posts"></div>

</div>

<script>
const supabase = window.supabase.createClient(
    "https://ivoxwblvtensfockqhty.supabase.co",
    "sb_publishable_tow2A6kwro01XXzu4Kp9bw_M8pfrPSW"
);

async function loadPosts() {
    const { data, error } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        document.getElementById('message').innerText = "Ошибка загрузки: " + error.message;
        return;
    }

    const container = document.getElementById('posts');
    container.innerHTML = '';

    data.forEach(post => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `<p>${post.content || ''}</p>`;

        if (post.images && post.images.length > 0) {
            const grid = document.createElement('div');
            grid.className = 'grid';

            post.images.forEach(img => {
                const image = document.createElement('img');
                image.src = img;
                grid.appendChild(image);
            });

            div.appendChild(grid);
        }

        container.appendChild(div);
    });
}

async function addPost() {
    const content = document.getElementById('content').value.trim();
    const files = document.getElementById('images').files;
    const message = document.getElementById('message');

    if (!content && files.length === 0) {
        message.innerText = "Нельзя опубликовать пустой пост";
        return;
    }

    if (files.length > 10) {
        message.innerText = "Можно загрузить максимум 10 фото";
        return;
    }

    let imageArray = [];

    for (let file of files) {
        const reader = new FileReader();
        await new Promise(resolve => {
            reader.onload = () => {
                imageArray.push(reader.result);
                resolve();
            };
            reader.readAsDataURL(file);
        });
    }

    const { error } = await supabase.from('posts').insert([
        { content, images: imageArray }
    ]);

    if (error) {
        message.innerText = "Ошибка сохранения: " + error.message;
        return;
    }

    document.getElementById('content').value = '';
    document.getElementById('images').value = '';
    message.innerText = "Опубликовано ✅";

    loadPosts();
}
document.getElementById("publishBtn").addEventListener("click", addPost);
loadPosts();
</script>

</body>
</html>
